server {
    listen 80;
    server_name excrementgaming.com www.excrementgaming.com;

    root /var/www/excrementgaming;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|json|ico|png|jpg|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    access_log /var/log/nginx/excrementgaming.access.log;
    error_log  /var/log/nginx/excrementgaming.error.log;
}
